name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-quality:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.1.6

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .
      - name: Type check
        run: |
          if find . -path ./.venv -prune -o -name "*.py" -print -quit | grep -q .; then
            mypy .
          else
            echo "No Python files found; skipping mypy."
          fi

      - name: Test
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

  frontend-quality:
    name: Frontend quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint & type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: [python-quality, frontend-quality]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --wait
          echo "All services healthy. Waiting for frontend to serve..."
          # Poll the frontend until it responds
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "Frontend ready!" && break
            echo "Waiting for frontend... attempt $i"
            sleep 2
          done

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
